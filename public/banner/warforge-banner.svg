<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="35%" style="stop-color:#1e1b4b"/>
      <stop offset="70%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <radialGradient id="bMoon" cx="78%" cy="18%" r="12%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="45%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="bHorizon" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#b91c1c;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="bFog" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.45"/>
    </linearGradient>
    <filter id="bGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="1920" height="480" fill="url(#bSky)"/>
  <!-- Yıldızlar -->
  <g fill="#e2e8f0" opacity="0.55">
    <circle cx="120" cy="60" r="1.2"/><circle cx="340" cy="40" r="0.8"/><circle cx="520" cy="90" r="1.2"/><circle cx="780" cy="50" r="0.9"/>
    <circle cx="1100" cy="70" r="1.1"/><circle cx="1400" cy="45" r="0.8"/><circle cx="1680" cy="85" r="1"/><circle cx="1840" cy="55" r="0.7"/>
  </g>
  <circle cx="1500" cy="95" r="48" fill="url(#bMoon)"/>
  <!-- Bulutlar -->
  <g fill="#334155" opacity="0.35">
    <ellipse cx="400" cy="120" rx="180" ry="35"/><ellipse cx="420" cy="125" rx="120" ry="28"/>
    <ellipse cx="1520" cy="110" rx="200" ry="40"/><ellipse cx="1540" cy="115" rx="140" ry="32"/>
  </g>
  <ellipse cx="960" cy="420" rx="900" ry="180" fill="url(#bHorizon)"/>
  <!-- Uzak dağlar -->
  <path d="M0 300 L0 280 L280 200 L520 260 L800 180 L1080 240 L1320 160 L1600 220 L1920 180 L1920 480 H0Z" fill="#1e293b" opacity="0.9"/>
  <path d="M0 340 L0 300 L400 240 L720 300 L1000 260 L1280 320 L1600 280 L1920 300 L1920 480 H0Z" fill="#0f172a"/>
  <!-- Savaş alevi (uzak) -->
  <g opacity="0.85" filter="url(#bGlow)">
    <ellipse cx="320" cy="260" r="35" fill="#f97316"/>
    <ellipse cx="1580" cy="250" r="45" fill="#dc2626"/>
    <ellipse cx="960" cy="270" r="28" fill="#ea580c"/>
  </g>
  <!-- Ana kale silüeti -->
  <g fill="#020617" stroke="#1e293b" stroke-width="1">
    <path d="M520 480 V320 L560 280 L600 300 L640 260 L680 280 L720 250 L760 280 L800 260 L840 280 L880 480 Z"/>
    <rect x="900" y="200" width="120" height="280"/>
    <polygon points="900,200 960,100 1020,200"/>
    <rect x="1080" y="220" width="360" height="260"/>
    <path d="M1080 220 L1120 180 L1160 200 L1200 170 L1240 200 L1280 175 L1320 200 L1360 180 L1400 200 L1440 480 H1080 Z"/>
    <rect x="920" y="300" width="36" height="90" fill="#0f172a"/>
    <rect x="964" y="300" width="36" height="90" fill="#0f172a"/>
    <rect x="1008" y="300" width="36" height="90" fill="#0f172a"/>
    <rect x="1120" y="320" width="40" height="80" fill="#0f172a"/>
    <rect x="1280" y="320" width="40" height="80" fill="#0f172a"/>
  </g>
  <!-- Ön plan silüet ordusu -->
  <g fill="#020617" opacity="0.65">
    <ellipse cx="280" cy="450" rx="180" ry="22"/>
    <ellipse cx="1640" cy="445" rx="200" ry="24"/>
    <ellipse cx="960" cy="455" rx="240" ry="20"/>
  </g>
  <rect width="1920" height="480" fill="url(#bFog)" opacity="0.6"/>
  <path d="M0 480 V400 Q480 360 960 380 T1920 360 V480" fill="url(#bSky)" opacity="0.25"/>
</svg>
